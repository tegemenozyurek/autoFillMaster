<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AutoFillMaster</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <img src="icons/autoFillMasterLogo.png" alt="" class="logo" width="44" height="44">
      <h1 class="title">AutoFillMaster</h1>
    </header>

    <p class="subtitle">Type naturally into any field on the page.</p>

    <textarea
      id="textInput"
      class="text-input"
      placeholder="Enter or paste the text you want to type…"
      rows="8"
      spellcheck="true"
    ></textarea>

    <div class="char-count" id="charCount">0 characters</div>

    <div class="actions">
      <button id="selectBtn" class="btn btn-primary" type="button">
        Select Field
      </button>
      <button id="cancelBtn" class="btn btn-secondary" type="button">
        Cancel
      </button>
    </div>

    <p id="statusMsg" class="status-msg" role="status" aria-live="polite"></p>
  </div>

  <script src="popup.js" type="module"></script>
</body>
</html>
