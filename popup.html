<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AutoFillMaster</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header class="topbar">
      <div class="brand">
        <img src="icons/logo.png" alt="" class="brand-logo" width="34" height="34">
        <h1 class="title">AutoFillMaster</h1>
      </div>
      <button id="githubBtn" class="github-icon-btn" type="button" title="GitHub" aria-label="Open GitHub">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 2a10 10 0 0 0-3.16 19.49c.5.09.68-.22.68-.48v-1.7c-2.78.6-3.37-1.19-3.37-1.19-.45-1.15-1.11-1.46-1.11-1.46-.91-.62.07-.61.07-.61 1 .07 1.53 1.03 1.53 1.03.9 1.52 2.35 1.08 2.92.83.09-.65.35-1.08.63-1.33-2.22-.25-4.55-1.11-4.55-4.94 0-1.09.39-1.98 1.03-2.68-.1-.25-.45-1.27.1-2.64 0 0 .84-.27 2.75 1.02A9.58 9.58 0 0 1 12 6.99c.85 0 1.71.11 2.51.35 1.9-1.29 2.74-1.02 2.74-1.02.55 1.37.2 2.39.1 2.64.64.7 1.03 1.59 1.03 2.68 0 3.84-2.34 4.68-4.57 4.93.36.31.68.92.68 1.86v2.58c0 .27.18.58.69.48A10 10 0 0 0 12 2Z"/>
        </svg>
      </button>
    </header>

    <nav class="mode-switch" role="tablist" aria-label="AutoFillMaster sections">
      <button id="autoFillTab" class="mode-btn active" type="button" role="tab" aria-selected="true" aria-controls="autoFillPanel">
        AutoFill
      </button>
      <button id="myDocsTab" class="mode-btn" type="button" role="tab" aria-selected="false" aria-controls="myDocsPanel">
        MyDocs
      </button>
      <button id="myLinksTab" class="mode-btn" type="button" role="tab" aria-selected="false" aria-controls="myLinksPanel">
        MyLinks
      </button>
    </nav>

    <main id="autoFillPanel" class="panel active" role="tabpanel" aria-labelledby="autoFillTab">
      <textarea
        id="textInput"
        class="text-input"
        placeholder="Enter or paste the text you want to type..."
        rows="8"
        spellcheck="true"
      ></textarea>

      <div class="char-count" id="charCount">0 characters</div>

      <div class="actions">
        <button id="selectBtn" class="btn btn-primary" type="button">
          Select Field
        </button>
        <button id="cancelBtn" class="btn btn-secondary" type="button">
          Cancel
        </button>
      </div>

      <section class="compact-section" aria-label="AutoFill history">
        <div class="section-head">
          <span>History</span>
          <button id="clearHistoryBtn" class="ghost-btn" type="button">Clear</button>
        </div>
        <div id="historyList" class="item-list empty">No history yet.</div>
      </section>
    </main>

    <section id="myDocsPanel" class="panel" role="tabpanel" aria-labelledby="myDocsTab" hidden>
      <div class="upload-row">
        <input id="pdfInput" class="file-input" type="file" accept="application/pdf,.pdf">
        <label class="upload-btn" for="pdfInput">Upload PDF</label>
      </div>
      <div id="docsList" class="item-list empty">No PDF uploaded yet.</div>
    </section>

    <section id="myLinksPanel" class="panel" role="tabpanel" aria-labelledby="myLinksTab" hidden>
      <div class="link-form">
        <input id="linkInput" class="text-field" type="url" placeholder="https://example.com">
        <button id="saveLinkBtn" class="btn btn-primary small-btn" type="button">Save</button>
      </div>
      <div id="linksList" class="item-list empty">No links saved yet.</div>
    </section>

    <p id="statusMsg" class="status-msg" role="status" aria-live="polite"></p>
  </div>

  <script src="popup.js" type="module"></script>
</body>
</html>
